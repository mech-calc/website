<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechCalc Pro - Engineering Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">⚙️ MECHCALC <span style="color:#3b82f6">PRO</span></div>
    <div class="lang-container">
        <select id="lang-switcher" onchange="changeLanguage(this.value)">
            <option value="de">🇩🇪 DE</option>
            <option value="en">🇺🇸 EN</option>
            <option value="it">🇮🇹 IT</option>
        </select>
    </div>
</header>

<div class="main-container">
    <!-- HAUPT-NAVIGATION -->
    <nav class="tab-nav">
        <button class="tab-btn active" onclick="openTab(event, 'tab-cutting')" id="btn-t1">📊 Schnittdaten</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-time')" id="btn-t2">⏱️ th Zeit</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-weight')" id="btn-t3">⚖️ Gewicht</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-comp')" id="btn-t4">🌀 Kompressor</button>
    </nav>

    <!-- SCHNITTDATEN SECTION -->
    <section id="tab-cutting" class="content-panel active">
        <div class="sub-nav">
            <button class="sub-btn active" onclick="openSubTab(event, 'cut-turning')" id="sbtn-turn">🔄 Drehen</button>
            <button class="sub-btn" onclick="openSubTab(event, 'cut-milling')" id="sbtn-mill">🚜 Fräsen</button>
            <button class="sub-btn" onclick="openSubTab(event, 'cut-drilling')" id="sbtn-drill">🎯 Bohren</button>
        </div>

        <div id="cut-turning" class="sub-panel active">
            <div class="calc-grid">
                <div class="form-group"><label id="lbl-d">Werkstück-Ø d (mm)</label><input type="number" id="in-turn-d" value="50"></div>
                <div class="form-group"><label id="lbl-vc">Schnittgeschw. vc (m/min)</label><input type="number" id="in-turn-vc" value="200"></div>
                <div class="form-group"><label id="lbl-f">Vorschub f (mm/U)</label><input type="number" id="in-turn-f" value="0.2"></div>
            </div>
        </div>

        <div id="cut-milling" class="sub-panel">
            <div class="calc-grid">
                <div class="form-group"><label id="lbl-dm">Fräser-Ø d (mm)</label><input type="number" id="in-mill-d" value="16"></div>
                <div class="form-group"><label id="lbl-vc2">Schnittgeschw. vc (m/min)</label><input type="number" id="in-mill-vc" value="150"></div>
                <div class="form-group"><label id="lbl-fz">Vorschub/Zahn fz (mm)</label><input type="number" id="in-mill-fz" value="0.1"></div>
                <div class="form-group"><label id="lbl-z">Zähnezahl z</label><input type="number" id="in-mill-z" value="4"></div>
            </div>
        </div>

        <div id="cut-drilling" class="sub-panel">
            <div class="calc-grid">
                <div class="form-group"><label id="lbl-db">Bohrer-Ø d (mm)</label><input type="number" id="in-drill-d" value="10"></div>
                <div class="form-group"><label id="lbl-vc3">Schnittgeschw. vc (m/min)</label><input type="number" id="in-drill-vc" value="80"></div>
                <div class="form-group"><label id="lbl-f2">Vorschub f (mm/U)</label><input type="number" id="in-drill-f" value="0.15"></div>
            </div>
        </div>
        <button class="action-btn" onclick="calculateCutting()" id="btn-calc1">🚀 Berechnen</button>
        <div id="res-cut" class="result-display"></div>
    </section>

    <!-- HAUPTNUTZUNGSZEIT SECTION -->
    <section id="tab-time" class="content-panel">
        <h3 id="h-time">⏱️ Hauptnutzungszeit th</h3>
        <div class="calc-grid">
            <div class="form-group"><label id="lbl-l">Eingriffslänge L (mm)</label><input type="number" id="in-time-l" value="100"></div>
            <div class="form-group"><label id="lbl-n">Drehzahl n (1/min)</label><input type="number" id="in-time-n" value="1200"></div>
            <div class="form-group"><label id="lbl-f3">Vorschub f (mm/U)</label><input type="number" id="in-time-f" value="0.2"></div>
            <div class="form-group"><label id="lbl-i">Anzahl der Schnitte i</label><input type="number" id="in-time-i" value="1"></div>
        </div>
        <button class="action-btn" onclick="calculateTime()" id="btn-calc2">⏱️ th Berechnen</button>
        <div id="res-time" class="result-display"></div>
    </section>

    <!-- GEWICHTSRECHNER SECTION -->
    <section id="tab-weight" class="content-panel">
        <h3 id="h-weight">⚖️ Gewichtsberechnung</h3>
        <div class="calc-grid">
            <div class="form-group">
                <label id="lbl-mat">Material (Dichte g/cm³)</label>
                <select id="in-w-rho">
                    <option value="7.85">Stahl (7.85)</option>
                    <option value="2.7">Aluminium (2.7)</option>
                    <option value="8.96">Kupfer (8.96)</option>
                    <option value="8.5">Messing (8.5)</option>
                </select>
            </div>
            <div class="form-group">
                <label id="lbl-form">Profilform</label>
                <select id="in-w-form" onchange="toggleWeightInputs()">
                    <option value="round" id="opt-round">⭕ Rundmaterial</option>
                    <option value="flat" id="opt-flat">🟦 Flach/Vierkant</option>
                </select>
            </div>
            <div class="form-group" id="w-d-div"><label id="lbl-w-d">Durchmesser d (mm)</label><input type="number" id="in-w-d" value="30"></div>
            <div class="form-group" id="w-b-div" style="display:none"><label id="lbl-w-b">Breite b (mm)</label><input type="number" id="in-w-b" value="50"></div>
            <div class="form-group" id="w-h-div" style="display:none"><label id="lbl-w-h">Höhe h (mm)</label><input type="number" id="in-w-h" value="10"></div>
            <div class="form-group"><label id="lbl-w-l">Länge L (mm)</label><input type="number" id="in-w-l" value="1000"></div>
        </div>
        <button class="action-btn" onclick="calculateWeight()" id="btn-calc3">⚖️ Masse m berechnen</button>
        <div id="res-weight" class="result-display"></div>
    </section>

    <!-- KOMPRESSOR SECTION -->
    <section id="tab-comp" class="content-panel">
        <h3 id="h-comp">🌀 Kolbenkompressor Technik</h3>
        <div class="form-group">
            <label id="lbl-select-calc">Berechnungstyp wählen</label>
            <select id="comp-selector" onchange="renderCompInputs()">
                <option value="Vh" id="opt-Vh">📏 Hubvolumen Vh</option>
                <option value="F" id="opt-F">💪 Kolbenbelastung F</option>
                <option value="Mmit" id="opt-Mmit">⚙️ Drehmoment Mmit</option>
                <option value="P" id="opt-P">🔋 Antriebsleistung P</option>
                <option value="Qth" id="opt-Qth">💨 Luftmenge Qth</option>
            </select>
        </div>
        <div id="comp-inputs" class="calc-grid"></div>
        <button class="action-btn" onclick="calculateCompressor()" id="btn-calc-comp">🌀 Berechnen</button>
        <div id="res-comp" class="result-display"></div>
    </section>
</div>

<footer>© 2026 MechCalc Pro - Haris L.</footer>

<script src="script.js"></script>
</body>
</html>
