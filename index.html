<!-- Sprachauswahl (kann überall platziert werden) -->
<div class="mc-language-wrapper">
    <select id="mc-language-select" onchange="mcChangeLanguage(this.value)">
        <option value="de">Deutsch</option>
        <option value="en">English</option>
        <option value="it">Italiano</option>
    </select>
</div>

<!-- Das Kachelmenü -->
<div id="mc-tile-menu-container" class="mc-grid-container">
    <!-- Wird dynamisch durch JS befüllt -->
</div>

<!-- Der Gewichtrechner (als Block für dein Modal) -->
<div id="mc-weight-calculator" class="mc-calculator-block">
    <!-- Wird dynamisch durch JS befüllt -->
</div>
