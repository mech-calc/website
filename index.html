<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechCalc - Zerspanungsrechner</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-container">
            <h1 id="logo">
                <a href="index.html">
                    <img src="logo.png" alt="MechCalc Logo" class="logo-img">
                </a>
            </h1>
            <div class="lang-selector">
                <select id="lang-dropdown" onchange="changeLanguage(this.value)">
                    <option value="de">Deutsch</option>
                    <option value="en">English</option>
                    <option value="it">Italiano</option>
                </select>
            </div>
        </div>
    </header>

    <main class="container">
        <section id="home">
            <h2 data-i18n="home_title">Wählen Sie einen Rechner</h2>
            <div class="grid">
                <!-- Die Funktionen rufen nun direkt openModal() auf -->
                <div class="card nav-card" onclick="openModal('calc-bohren')">
                    <div class="icon">⚙️</div>
                    <h3 data-i18n="nav_bohren_vc">Schnittdaten Bohren</h3>
                </div>
                <div class="card nav-card" onclick="openModal('calc-drehen')">
                    <div class="icon">🌀</div>
                    <h3 data-i18n="nav_drehen_vc">Schnittdaten Drehen</h3>
                </div>
                <div class="card nav-card" onclick="openModal('calc-fraesen')">
                    <div class="icon">✂️</div>
                    <h3 data-i18n="nav_fraesen_vc">Schnittdaten Fräsen</h3>
                </div>
                <div class="card nav-card" onclick="openModal('th-bohren')">
                    <div class="icon">⏱️</div>
                    <h3 data-i18n="nav_bohren_th">Hauptnutzungszeit Bohren</h3>
                </div>
                <div class="card nav-card" onclick="openModal('th-drehen')">
                    <div class="icon">📈</div>
                    <h3 data-i18n="nav_drehen_th">Hauptnutzungszeit Drehen</h3>
                </div>
            </div>
        </section>
    </main>

    <!-- MODERNES MODAL SYSTEM -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-box card">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="calc-title">Titel</h2>
            
            <div id="input-fields" class="input-grid">
                <!-- JS generiert hier die Felder -->
            </div>

            <button class="btn-primary" onclick="calculate()" data-i18n="btn_calc">Berechnen</button>

            <div class="results-container">
                <h3 data-i18n="title_results">Ergebnisse:</h3>
                <div id="results-display"></div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-container">
            <p>&copy; 2026 MechCalc V1.0 | Haris L.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
