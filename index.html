<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechCalc Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">⚙️ MECHCALC <span style="color:#3b82f6">PRO</span></div>
    <div class="lang-container">
        <select id="lang-switcher" onchange="changeLanguage(this.value)">
            <option value="de">🇩🇪 DE</option>
            <option value="it">🇮🇹 IT</option>
            <option value="en">🇺🇸 EN</option>
        </select>
    </div>
</header>

<div class="main-container">
    <nav class="tab-nav">
        <button class="tab-btn active" onclick="openTab(event, 'tab-cutting')" id="t1">📊 Schnittdaten</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-time')" id="t2">⏱️ Hauptnutzungszeit</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-weight')" id="t3">⚖️ Gewicht</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-comp')" id="t4">🌀 Kompressor</button>
    </nav>

    <section id="tab-cutting" class="content-panel active">
        <div class="sub-nav">
            <button class="sub-btn active" onclick="openSubTab(event, 'cut-turning')" id="st1">🔄 Drehen</button>
            <button class="sub-btn" onclick="openSubTab(event, 'cut-milling')" id="st2">⚙️ Fräsen</button>
            <button class="sub-btn" onclick="openSubTab(event, 'cut-drilling')" id="st3">🎯 Bohren</button>
        </div>
        <div class="calc-grid">
            <div class="form-group"><label id="lbl-d">Durchmesser d (mm)</label><input type="number" id="c-d" value="50"></div>
            <div class="form-group"><label id="lbl-vc">vc (m/min)</label><input type="number" id="c-vc" value="200"></div>
            <div class="form-group"><label id="lbl-f">f (mm/U)</label><input type="number" id="c-f" value="0.2"></div>
            <div class="form-group mill-only" style="display:none"><label id="lbl-z">Zähnezahl z</label><input type="number" id="c-z" value="4"></div>
        </div>
        <button class="action-btn" onclick="calculateCutting()" id="btn-c">🚀 Berechnen</button>
        <div id="res-cut" class="result-display"></div>
    </section>

    <section id="tab-time" class="content-panel">
        <h3 id="h-time">⏱️ Hauptnutzungszeit</h3>
        <div class="sub-nav">
            <button class="sub-btn active" onclick="setThMode('turn')" id="st-th1">🔄 Drehen</button>
            <button class="sub-btn" onclick="setThMode('drill')" id="st-th2">🎯 Bohren</button>
        </div>
        <div class="calc-grid">
            <div class="form-group"><label id="lbl-l">Schnittlänge L (mm)</label><input type="number" id="th-l" value="100"></div>
            <div class="form-group"><label id="lbl-la">Anlauf la (mm)</label><input type="number" id="th-la" value="2"></div>
            <div class="form-group"><label id="lbl-lu">Überlauf lu (mm)</label><input type="number" id="th-lu" value="2"></div>
            <div class="form-group"><label id="lbl-tn">Drehzahl n (1/min)</label><input type="number" id="th-n" value="1000"></div>
            <div class="form-group"><label id="lbl-tf">Vorschub f (mm/U)</label><input type="number" id="th-f" value="0.2"></div>
            <div class="form-group"><label id="lbl-ti">Anzahl Schnitte i</label><input type="number" id="th-i" value="1"></div>
        </div>
        <button class="action-btn" onclick="calculateTh()" id="btn-th">🚀 Berechnen</button>
        <div id="res-time" class="result-display"></div>
    </section>

    <section id="tab-weight" class="content-panel">
        <h3 id="h-weight">⚖️ Gewichtsberechnung</h3>
        <div class="calc-grid">
            <div class="form-group"><label id="lbl-mat">Material</label>
                <select id="w-rho"></select>
            </div>
            <div class="form-group"><label id="lbl-form">Form</label>
                <select id="w-form" onchange="toggleWeightInputs()">
                    <option value="round" id="opt-r">Rund</option>
                    <option value="flat" id="opt-f">Flach</option>
                </select>
            </div>
            <div class="form-group" id="w-d-box"><label id="lbl-wd">Ø d (mm)</label><input type="number" id="w-d" value="20"></div>
            <div class="form-group w-flat-box" style="display:none"><label id="lbl-wb">Breite B (mm)</label><input type="number" id="w-b" value="50"></div>
            <div class="form-group w-flat-box" style="display:none"><label id="lbl-wh">Höhe H (mm)</label><input type="number" id="w-h" value="10"></div>
            <div class="form-group"><label id="lbl-wl">Länge L (mm)</label><input type="number" id="w-l" value="1000"></div>
        </div>
        <button class="action-btn" onclick="calculateWeight()" id="btn-w">🚀 Berechnen</button>
        <div id="res-weight" class="result-display"></div>
    </section>

    <section id="tab-comp" class="content-panel">
        <h3 id="h-comp">🌀 Auslegung von Kompressoren</h3>
        <div class="form-group">
            <label id="lbl-sel-comp">Berechnung wählen</label>
            <select id="comp-mode" onchange="renderCompInputs()"></select>
        </div>
        <div id="comp-inputs" class="calc-grid" style="margin-top:20px;"></div>
        <button class="action-btn" onclick="calculateComp()" id="btn-comp">🚀 Berechnen</button>
        <div id="res-comp" class="result-display"></div>
    </section>
</div>

<footer>© 2026 MechCalc Pro - Haris L.</footer>
<script src="script.js"></script>
</body>
</html>
